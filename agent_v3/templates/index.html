<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cornerstone AI Agent v3</title>
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24283b;
    --border: #414868;
    --text: #c0caf5;
    --text-dim: #565f89;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --red: #f7768e;
    --yellow: #e0af68;
    --magenta: #bb9af7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    color: var(--magenta);
    font-weight: 600;
  }
  header .status {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }
  header select {
    background: var(--bg);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  header button {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { color: var(--accent); border-color: var(--accent); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: var(--bg);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    border: 1px dashed var(--border);
    padding: 6px 12px;
  }
  .msg.tool-call {
    align-self: flex-start;
    background: rgba(158, 206, 106, 0.1);
    border: 1px solid var(--green);
    font-size: 12px;
    color: var(--green);
  }
  .msg.tool-result {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    max-height: 200px;
    overflow-y: auto;
  }
  .msg.blocked {
    align-self: flex-start;
    background: rgba(247, 118, 142, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 12px;
  }
  .msg.cost-info {
    align-self: center;
    background: rgba(224, 175, 104, 0.1);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 12px;
  }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #input-area input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  #input-area input:focus { border-color: var(--accent); }
  #input-area input::placeholder { color: var(--text-dim); }
  #input-area button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #input-area button:hover { opacity: 0.9; }
  #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing {
    display: inline-block;
    color: var(--text-dim);
    font-size: 12px;
  }
  .typing::after {
    content: '...';
    animation: dots 1s steps(3) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>

<header>
  <h1>Cornerstone AI Agent v3</h1>
  <select id="model-select">
    <option value="sonnet">Sonnet (fast)</option>
    <option value="opus">Opus (powerful)</option>
    <option value="haiku">Haiku (cheap)</option>
  </select>
  <button onclick="sendCommand('cost')">Cost</button>
  <button onclick="sendCommand('keys')">Keys</button>
  <span class="status" id="status">Connecting...</span>
</header>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" />
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const modelSelect = document.getElementById('model-select');
let ws;
let busy = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

  ws.onopen = () => {
    statusEl.textContent = 'Connected';
    statusEl.style.color = '#9ece6a';
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected — refreshing...';
    statusEl.style.color = '#f7768e';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'assistant':
      addMsg('assistant', msg.text);
      break;
    case 'system':
      addMsg('system', msg.text);
      break;
    case 'tool_call':
      const inputStr = Object.entries(msg.input || {})
        .map(([k, v]) => `${k}: ${typeof v === 'string' && v.length > 100 ? `(${v.length} chars)` : v}`)
        .join('\n');
      addMsg('tool-call', `Executing: ${msg.tool}\n${inputStr}`);
      break;
    case 'tool_result':
      addMsg('tool-result', `Result (${msg.tool}):\n${msg.result}`);
      break;
    case 'blocked':
      addMsg('blocked', `BLOCKED: ${msg.reason}`);
      break;
    case 'cost':
      addMsg('cost-info', msg.text);
      break;
    case 'keys':
      const rows = (msg.stats || []).map(s =>
        `#${s.key_number} ${s.masked_key} | calls:${s.calls} errors:${s.errors} rl:${s.rate_limited ? 'yes' : 'no'} cd:${s.cooldown_remaining}s`
      ).join('\n');
      addMsg('cost-info', 'API Key Stats:\n' + rows);
      break;
    case 'status':
      statusEl.textContent = msg.text;
      break;
    case 'done':
      busy = false;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
      break;
    case 'error':
      addMsg('blocked', `Error: ${msg.text}`);
      busy = false;
      sendBtn.disabled = false;
      input.disabled = false;
      break;
  }
}

function addMsg(cls, text) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const text = input.value.trim();
  if (!text || busy) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'chat', text }));
  input.value = '';
  busy = true;
  sendBtn.disabled = true;
  input.disabled = true;
}

function sendCommand(type) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type }));
}

modelSelect.addEventListener('change', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'model_switch', model: modelSelect.value }));
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

connect();
</script>
</body>
</html>
