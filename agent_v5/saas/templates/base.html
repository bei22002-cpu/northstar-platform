<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cornerstone AI{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">&#9670;</span> Cornerstone AI
            </a>
            <div class="nav-links">
                {% if user %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/chat">Chat</a>
                    <a href="/pricing">Pricing</a>
                    {% if user.is_admin %}
                        <a href="/admin">Admin</a>
                    {% endif %}
                    <span class="nav-user">{{ user.email }}</span>
                    <a href="/logout" class="btn btn-sm">Logout</a>
                {% else %}
                    <a href="/pricing">Pricing</a>
                    <a href="/login" class="btn btn-sm btn-outline">Login</a>
                    <a href="/signup" class="btn btn-sm btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
